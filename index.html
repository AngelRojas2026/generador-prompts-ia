<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart IA | Pro 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .main-container {
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
        }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        .bubble-ai { background: white; border: 1px solid rgba(99, 102, 241, 0.1); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .bubble-user { background: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>

    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        async function enviar() {
            const input = document.getElementById("prompt");
            const chat = document.getElementById("chatBox");
            const text = input.value.trim();
            
            if(!text) return;

            // UI: Mensaje usuario
            input.value = "";
            chat.innerHTML += `
                <div class="flex justify-end mb-6 animate-pop">
                    <div class="bubble-user p-4 rounded-2xl rounded-tr-none max-w-[85%] md:max-w-[70%] text-lg">
                        ${text}
                    </div>
                </div>`;
            
            const aiId = "ai-" + Date.now();
            chat.innerHTML += `
                <div class="flex justify-start mb-6 animate-pop">
                    <div id="${aiId}" class="bubble-ai p-5 rounded-2xl rounded-tl-none max-w-[90%] md:max-w-[80%] text-gray-800 border shadow-sm">
                        <span class="text-[10px] font-black text-indigo-500 uppercase block mb-2 tracking-widest">EduSmart AI</span>
                        <div class="typing-text">EduSmart está analizando...</div>
                    </div>
                </div>`;
            
            chat.scrollTop = chat.scrollHeight;

            try {
                // Conexión al Space
                const app = await client("Rojas2026/tutor-ia-escolar");
                const result = await app.predict("/chat", [text]);

                // Mostrar respuesta
                const aiResponse = result.data[0];
                document.getElementById(aiId).querySelector(".typing-text").innerHTML = aiResponse.replace(/\n/g, '<br>');
                
            } catch (err) {
                console.error(err);
                document.getElementById(aiId).querySelector(".typing-text").innerHTML = "⚠️ El servidor está despertando. Reintenta enviar en 10 segundos.";
            }
            chat.scrollTop = chat.scrollHeight;
        }

        window.enviar = enviar;
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("prompt").addEventListener("keypress", (e) => { if (e.key === "Enter") enviar(); });
        });
    </script>
</head>
<body>

    <div class="main-container">
        
        <!-- Navbar -->
        <header class="p-5 border-b border-gray-200/50 flex justify-between items-center bg-white/40">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-800 text-indigo-950 tracking-tighter">EduSmart <span class="text-indigo-600 font-normal">2026</span></h1>
            </div>
            
            <a href="https://ko-fi.com/angelrojas2026" target="_blank" class="hover:scale-105 transition active:scale-95">
                <img src="https://ko-fi.com/img/githubbutton_sm.svg" alt="Ko-fi" class="h-10">
            </a>
        </header>

        <!-- Chat Area -->
        <div id="chatBox" class="chat-area flex-1 overflow-y-auto p-4 md:px-24 lg:px-72 py-10">
            <div class="bg-white/60 border-2 border-dashed border-indigo-200 p-10 rounded-[3rem] text-center mb-10 shadow-sm">
                <h2 class="text-3xl font-black text-indigo-900 mb-2">¡Hola Estudiante!</h2>
                <p class="text-gray-600 font-medium">¿Qué aprendemos hoy?</p>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="p-8 md:px-24 lg:px-72 bg-white/40 backdrop-blur-xl border-t border-gray-200/50">
            <div class="max-w-5xl mx-auto flex gap-4 h-16">
                <input type="text" id="prompt" autocomplete="off"
                    class="flex-1 px-8 rounded-[1.5rem] bg-white shadow-2xl border-2 border-transparent focus:border-indigo-500 focus:outline-none text-gray-700 text-lg transition-all"
                    placeholder="Escribe tu pregunta aquí...">
                
                <button onclick="enviar()" class="bg-indigo-600 text-white px-10 rounded-[1.5rem] font-bold hover:bg-indigo-700 transition-all shadow-xl active:scale-95 flex items-center">
                    Enviar
                </button>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-5 font-bold uppercase tracking-[0.4em]">Tecnología Educativa de Alto Rendimiento</p>
        </footer>

    </div>

</body>
</html>
