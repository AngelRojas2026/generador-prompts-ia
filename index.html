<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart IA | 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>

    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        async function preguntar() {
            const input = document.getElementById("prompt");
            const chat = document.getElementById("chatBox");
            const text = input.value.trim();
            
            if(!text) return;
            
            // UI: Mensaje usuario
            input.value = "";
            chat.innerHTML += `
                <div class="flex justify-end animate-bounce-in">
                    <div class="bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-none shadow-xl max-w-[80%] mb-4">
                        ${text}
                    </div>
                </div>`;
            
            chat.scrollTop = chat.scrollHeight;

            try {
                // CONEXIÓN AL SPACE
                const app = await client("Rojas2026/tutor-ia-escolar");
                const result = await app.predict("/chat", [text, []]); // Cambiado para mayor compatibilidad

                const rawResponse = result.data[0];

                chat.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-lg border border-indigo-50 max-w-[85%] mb-4 text-gray-800 leading-relaxed">
                            <span class="text-xs font-black text-indigo-500 uppercase block mb-1">EduSmart AI</span>
                            ${rawResponse}
                        </div>
                    </div>`;
            } catch (err) {
                console.error(err);
                chat.innerHTML += `<div class="text-center p-2 bg-red-100 text-red-600 rounded-lg text-xs mb-4">⚠️ El servidor está despertando. Por favor, intenta de nuevo en 10 segundos.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
        window.preguntar = preguntar;
    </script>
</head>
<body class="h-screen flex items-center justify-center p-2 md:p-6">

    <div class="glass-panel w-full max-w-5xl h-[90vh] rounded-[2rem] shadow-2xl flex flex-col overflow-hidden">
        
        <!-- Header con Ko-fi -->
        <header class="p-6 flex justify-between items-center border-b border-gray-200/50">
            <div>
                <h1 class="text-2xl font-800 text-indigo-900 flex items-center gap-2">
                    <span class="bg-indigo-600 text-white p-1.5 rounded-lg">🚀</span> 
                    EduSmart <span class="text-indigo-500 text-sm font-normal">v1.0</span>
                </h1>
            </div>
            <a href="https://ko-fi.com/angelrojas2026" target="_blank" class="transform hover:scale-110 transition">
                <img src="https://ko-fi.com/img/githubbutton_sm.svg" alt="Ko-fi" class="h-10">
            </a>
        </header>

        <!-- Chat Area -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-6 chat-scroll flex flex-col">
            <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-2xl text-indigo-700 text-center mb-8">
                🔥 <b>¡Bienvenido al futuro!</b> Soy tu IA de alto rendimiento para bachillerato.
            </div>
        </div>

        <!-- Input Area -->
        <footer class="p-6 bg-white/50 backdrop-blur-sm">
            <div class="relative max-w-3xl mx-auto">
                <input type="text" id="prompt" 
                    class="w-full py-5 px-8 pr-20 bg-white rounded-3xl shadow-inner border-2 border-transparent focus:border-indigo-500 focus:outline-none text-gray-700 font-medium transition-all"
                    placeholder="¿Qué quieres resolver hoy? Ej: Ley de Newton...">
                
                <button onclick="preguntar()" class="absolute right-2 top-2 bottom-2 px-6 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all active:scale-95 shadow-lg">
                    Enviar
                </button>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-4 font-bold tracking-widest uppercase">Propulsado por Hugging Face & Rojas2026</p>
        </footer>
    </div>

</body>
</html>
