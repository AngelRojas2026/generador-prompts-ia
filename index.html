<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart IA - Tutor Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        async function enviarPregunta() {
            const input = document.getElementById("pregunta");
            const btn = document.getElementById("btnEnviar");
            const chat = document.getElementById("chatBox");
            
            if (!input.value) return;

            // Bloquear botón mientras piensa
            const preguntaUsuario = input.value;
            input.value = "";
            btn.disabled = true;
            chat.innerHTML += `<div class="mb-4 text-right"><span class="bg-blue-500 text-white p-2 rounded-lg inline-block">${preguntaUsuario}</span></div>`;

            try {
                // AQUÍ CONECTAMOS CON TU SPACE
                // Cambia 'Rojas2026/tutor-ia-escolar' por tu usuario y nombre de space
                const app = await client("Rojas2026/tutor-ia-escolar"); 
                const result = await app.predict("/chat", {
                    message: preguntaUsuario,
                });

                const respuestaIA = result.data[0];
                chat.innerHTML += `<div class="mb-4 text-left"><span class="bg-gray-200 text-black p-2 rounded-lg inline-block">🤖 ${respuestaIA}</span></div>`;
            } catch (error) {
                chat.innerHTML += `<div class="text-red-500">Error: No pude conectar con la IA.</div>`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
        window.enviarPregunta = enviarPregunta;
    </script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-lg text-center">
        <h1 class="text-2xl font-bold">🎓 EduSmart IA</h1>
        <p class="text-sm">Tu asistente escolar inteligente</p>
    </header>

    <main class="flex-1 overflow-y-auto p-4" id="chatBox">
        <div class="mb-4 text-left">
            <span class="bg-gray-200 text-black p-2 rounded-lg inline-block">¡Hola! Soy tu tutor. ¿En qué materia necesitas ayuda hoy?</span>
        </div>
    </main>

    <footer class="p-4 bg-white border-t flex gap-2">
        <input type="text" id="pregunta" class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:border-blue-500" placeholder="Escribe tu duda aquí...">
        <button onclick="enviarPregunta()" id="btnEnviar" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">Enviar</button>
    </footer>

</body>
</html>
