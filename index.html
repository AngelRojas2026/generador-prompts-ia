<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart IA | Sistema Profesional 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .main-container {
            width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(30px);
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        .bubble-ai { background: white; border: 1px solid rgba(99, 102, 241, 0.1); }
        .bubble-user { background: #4f46e5; color: white; shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        
        .fade-entry { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let chatHistory = [];

        async function enviar() {
            const input = document.getElementById("prompt");
            const chat = document.getElementById("chatBox");
            const text = input.value.trim();
            
            if(!text) return;

            // UI: Mensaje del usuario
            input.value = "";
            chat.innerHTML += `
                <div class="flex justify-end mb-8 fade-entry">
                    <div class="bubble-user p-5 rounded-2xl rounded-tr-none max-w-[85%] md:max-w-[65%] text-lg shadow-lg">
                        ${text}
                    </div>
                </div>`;
            
            const aiId = "ai-" + Date.now();
            chat.innerHTML += `
                <div class="flex justify-start mb-8 fade-entry">
                    <div id="${aiId}" class="bubble-ai p-6 rounded-2xl rounded-tl-none max-w-[95%] md:max-w-[85%] text-gray-800 border shadow-md">
                        <span class="text-[11px] font-black text-indigo-600 uppercase block mb-3 tracking-[0.2em]">EduSmart AI System</span>
                        <div class="typing-text leading-relaxed">Analizando y consultando base de datos...</div>
                    </div>
                </div>`;
            
            chat.scrollTop = chat.scrollHeight;

            try {
                // CONEXIÓN CON EL SPACE
                const app = await client("Rojas2026/tutor-ia-escolar");
                const result = await app.predict("/chat", {
                    message: text,
                    history: chatHistory
                });

                const aiResponse = result.data[0];
                document.getElementById(aiId).querySelector(".typing-text").innerHTML = aiResponse.replace(/\n/g, '<br>');
                
                // Actualizar historial local
                chatHistory.push([text, aiResponse]);

            } catch (err) {
                console.error(err);
                document.getElementById(aiId).querySelector(".typing-text").innerHTML = "⚠️ Sistema en mantenimiento o iniciando. Por favor, reintenta en 15 segundos.";
            }
            chat.scrollTop = chat.scrollHeight;
        }

        window.enviar = enviar;
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("prompt").addEventListener("keypress", (e) => { if (e.key === "Enter") enviar(); });
        });
    </script>
</head>
<body>

    <div class="main-container">
        
        <!-- Header -->
        <header class="p-6 border-b border-gray-200/50 flex justify-between items-center bg-white/40">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <h1 class="text-3xl font-800 text-indigo-950 tracking-tighter">EduSmart <span class="text-indigo-600 font-light">PRO</span></h1>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="https://ko-fi.com/angelrojas2026" target="_blank" class="hover:scale-105 transition active:scale-95">
                    <img src="https://ko-fi.com/img/githubbutton_sm.svg" alt="Ko-fi" class="h-11">
                </a>
            </div>
        </header>

        <!-- Chat Area (Full Screen) -->
        <div id="chatBox" class="chat-area flex-1 overflow-y-auto p-4 md:px-24 lg:px-64 py-12">
            <div class="bg-white/70 border-2 border-dashed border-indigo-200 p-12 rounded-[3.5rem] text-center mb-12 shadow-sm">
                <h2 class="text-4xl font-black text-indigo-900 mb-4 tracking-tight">Centro de Inteligencia Académica</h2>
                <p class="text-gray-600 text-xl font-medium max-w-2xl mx-auto">Tu tutor avanzado para Matemáticas, Ciencias e Historia. Escribe tu duda y la resolveremos paso a paso.</p>
            </div>
        </div>

        <!-- Input Fijo Abajo -->
        <footer class="p-10 md:px-24 lg:px-64 bg-white/40 border-t border-gray-200/50">
            <div class="max-w-6xl mx-auto flex gap-5 h-20">
                <input type="text" id="prompt" autocomplete="off"
                    class="flex-1 px-10 rounded-3xl bg-white shadow-2xl border-2 border-transparent focus:border-indigo-500 focus:outline-none text-gray-700 text-xl transition-all font-medium"
                    placeholder="Escribe tu consulta académica aquí...">
                
                <button onclick="enviar()" class="bg-indigo-600 text-white px-14 rounded-3xl font-bold hover:bg-indigo-700 transition shadow-2xl flex items-center text-lg active:scale-95">
                    Consultar IA
                </button>
            </div>
            <div class="flex justify-center gap-8 mt-6">
                 <span class="text-[10px] text-indigo-900/40 font-bold uppercase tracking-widest">Matemáticas</span>
                 <span class="text-[10px] text-indigo-900/40 font-bold uppercase tracking-widest">Física</span>
                 <span class="text-[10px] text-indigo-900/40 font-bold uppercase tracking-widest">Historia</span>
                 <span class="text-[10px] text-indigo-900/40 font-bold uppercase tracking-widest">Química</span>
            </div>
        </footer>

    </div>

</body>
</html>
