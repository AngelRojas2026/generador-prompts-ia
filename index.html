<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO AVANZADO PARA GOOGLE -->
    <title>EduSmart IA | Tu Tutor de Bachillerato Inteligente Gratis</title>
    <meta name="description" content="La IA definitiva para estudiantes. Resuelve matemáticas, física, química y más con EduSmart. Gratis, rápido y fácil.">
    
    <!-- Importación de Tailwind y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 10px; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    </style>

    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        async function enviarPregunta() {
            const input = document.getElementById("pregunta");
            const btn = document.getElementById("btnEnviar");
            const chat = document.getElementById("chatBox");
            
            if (!input.value.trim()) return;

            const preguntaUsuario = input.value;
            input.value = "";
            btn.disabled = true;
            btn.classList.add("opacity-50");
            
            // Mensaje del Usuario
            chat.innerHTML += `
                <div class="flex justify-end mb-6 animate-fade-in">
                    <div class="bg-blue-600 text-white px-5 py-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-lg">
                        ${preguntaUsuario}
                    </div>
                </div>`;

            chat.scrollTop = chat.scrollHeight;

            try {
                // REEMPLAZA CON TU USUARIO Y NOMBRE DE SPACE
                const app = await client("Rojas2026/tutor-ia-escolar"); 
                const result = await app.predict("/chat", { message: preguntaUsuario });

                const respuestaIA = result.data[0];
                
                // Mensaje de la IA
                chat.innerHTML += `
                    <div class="flex justify-start mb-6">
                        <div class="bg-white text-gray-800 px-5 py-3 rounded-2xl rounded-tl-none max-w-[85%] shadow-md border border-gray-100 leading-relaxed">
                            <div class="text-xs font-bold text-blue-500 mb-1">EDUSMART IA</div>
                            ${respuestaIA.replace(/\n/g, '<br>')}
                        </div>
                    </div>`;
            } catch (error) {
                chat.innerHTML += `<div class="text-center text-red-400 text-sm my-4">❌ Error de conexión. Revisa tu Space.</div>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove("opacity-50");
                chat.scrollTop = chat.scrollHeight;
            }
        }
        window.enviarPregunta = enviarPregunta;
        
        // Permitir enviar con la tecla Enter
        document.addEventListener("keypress", (e) => { if(e.key === "Enter") enviarPregunta(); });
    </script>
</head>
<body class="bg-[#f8fafc] h-screen flex flex-col">

    <!-- Header Profesional -->
    <header class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                EduSmart IA
            </span>
        </div>
        
        <!-- Botón Coffee -->
        <a href="https://www.buymeacoffee.com/TU_USUARIO" target="_blank" class="hover:scale-105 transition-transform">
            <img src="https://img.buymeacoffee.com/button-api/?text=Apóyame&emoji=☕&slug=TU_USUARIO&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" class="h-9 rounded-lg shadow-sm">
        </a>
    </header>

    <!-- Área de Chat -->
    <main id="chatBox" class="chat-container flex-1 overflow-y-auto px-4 py-8 md:px-[20%] lg:px-[30%] space-y-4">
        <!-- Mensaje de Bienvenida -->
        <div class="flex justify-start mb-6">
            <div class="bg-white text-gray-800 px-5 py-3 rounded-2xl rounded-tl-none shadow-md border border-gray-100">
                <p class="text-sm">👋 ¡Hola! Soy tu tutor especializado. ¿En qué tarea de bachillerato te ayudo hoy? Puedo explicarte matemáticas, historia, ciencias y más.</p>
            </div>
        </div>
    </main>

    <!-- Input de Texto Fijo Abajo -->
    <footer class="p-4 md:p-8 bg-gradient-to-t from-[#f8fafc] via-[#f8fafc] to-transparent">
        <div class="max-w-4xl mx-auto relative group">
            <input type="text" id="pregunta" 
                class="w-full bg-white border border-gray-200 rounded-2xl py-4 px-6 pr-14 shadow-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-gray-700"
                placeholder="Escribe aquí tu duda escolar...">
            
            <button onclick="enviarPregunta()" id="btnEnviar" 
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-600 text-white p-2.5 rounded-xl hover:bg-blue-700 transition-colors shadow-lg active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-4 uppercase tracking-widest font-semibold">Desarrollado con IA para Estudiantes</p>
    </footer>

</body>
</html>
