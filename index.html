<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart IA | Sistema Educativo Pro</title>

    <!-- ICONO -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/artificial-intelligence.png">
    
    <!-- LIBRERÍAS: Tailwind, Google Fonts y Marked (para ver bien el texto de la IA) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .main-container {
            width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        .bubble-ai { background: rgba(255, 255, 255, 0.95); color: #1e293b; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .bubble-user { background: #6366f1; color: white; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
        
        /* Estilos para las tablas y listas que responda la IA */
        .typing-text table { border-collapse: collapse; margin: 10px 0; width: 100%; }
        .typing-text th, .typing-text td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .typing-text ul { list-style-type: disc; margin-left: 20px; }

        .animate-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let chatHistory = [];

        async function enviar() {
            const input = document.getElementById("prompt");
            const chat = document.getElementById("chatBox");
            const text = input.value.trim();
            
            if(!text) return;

            // Mostrar mensaje del usuario
            input.value = "";
            chat.innerHTML += `
                <div class="flex justify-end mb-8 animate-up">
                    <div class="bubble-user p-5 rounded-2xl rounded-tr-none max-w-[85%] md:max-w-[65%] text-lg">
                        ${text}
                    </div>
                </div>`;
            
            // Crear burbuja de carga para la IA
            const aiId = "ai-" + Date.now();
            chat.innerHTML += `
                <div class="flex justify-start mb-8 animate-up">
                    <div id="${aiId}" class="bubble-ai p-6 rounded-2xl rounded-tl-none max-w-[95%] md:max-w-[80%] border">
                        <div class="flex items-center gap-2 mb-3">
                            <img src="https://img.icons8.com/fluency/48/artificial-intelligence.png" class="w-5 h-5">
                            <span class="text-[11px] font-black text-indigo-600 uppercase tracking-widest">EduSmart AI</span>
                        </div>
                        <div class="typing-text leading-relaxed font-medium text-gray-700">
                            <span class="animate-pulse">EduSmart está procesando tu duda...</span>
                        </div>
                    </div>
                </div>`;
            
            chat.scrollTop = chat.scrollHeight;

            try {
                // Conexión al Space
                const app = await client("Rojas2026/tutor-ia-escolar");
                
                // Llamada a la API de Gradio ChatInterface
                const result = await app.predict("/chat", { 
                    message: text, 
                    history: chatHistory 
                });

                const aiResponse = result.data[0];
                
                // Convertir Markdown a HTML y mostrarlo
                document.getElementById(aiId).querySelector(".typing-text").innerHTML = marked.parse(aiResponse);
                
                // Guardar en historial
                chatHistory.push([text, aiResponse]);

            } catch (err) {
                console.error(err);
                document.getElementById(aiId).querySelector(".typing-text").innerHTML = "⚠️ El sistema está iniciando. Por favor, espera 10 segundos y vuelve a preguntar.";
            }
            chat.scrollTop = chat.scrollHeight;
        }

        // Hacer la función global
        window.enviar = enviar;

        // Escuchar el Enter
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("prompt").addEventListener("keypress", (e) => { 
                if (e.key === "Enter") enviar(); 
            });
        });
    </script>
</head>
<body>

    <div class="main-container">
        
        <!-- Header -->
        <header class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
            <div class="flex items-center gap-4">
                <img src="https://img.icons8.com/fluency/48/artificial-intelligence.png" class="w-10 h-10 shadow-lg">
                <h1 class="text-3xl font-800 text-white tracking-tighter">EduSmart <span class="text-indigo-400 font-light">IA</span></h1>
            </div>
            
            <a href="https://ko-fi.com/angelrojas2026" target="_blank" class="hover:scale-105 transition active:scale-95">
                <img src="https://ko-fi.com/img/githubbutton_sm.svg" alt="Ko-fi" class="h-11 rounded-lg">
            </a>
        </header>

        <!-- Chat Area -->
        <div id="chatBox" class="chat-area flex-1 overflow-y-auto p-4 md:px-32 lg:px-64 py-12">
            <div class="bg-white/10 border border-white/20 p-12 rounded-[3.5rem] text-center mb-12">
                <h2 class="text-4xl font-black text-white mb-4">¿Qué quieres aprender hoy?</h2>
                <p class="text-indigo-200 text-xl font-medium">Saber de Matemáticas, Física, Historia y más nunca fue tan fácil.</p>
            </div>
        </div>

        <!-- Input Fijo -->
        <footer class="p-10 md:px-32 lg:px-64 bg-black/20 border-t border-white/10">
            <div class="max-w-6xl mx-auto flex gap-5 h-16">
                <input type="text" id="prompt" autocomplete="off"
                    class="flex-1 px-10 rounded-2xl bg-white shadow-2xl border-none focus:ring-4 focus:ring-indigo-500/50 text-gray-800 text-lg outline-none font-semibold"
                    placeholder="Escribe tu pregunta académica...">
                
                <button onclick="enviar()" class="bg-indigo-600 text-white px-14 rounded-2xl font-bold hover:bg-indigo-500 transition shadow-2xl active:scale-95 text-lg">
                    Preguntar
                </button>
            </div>
        </footer>

    </div>

</body>
</html>
